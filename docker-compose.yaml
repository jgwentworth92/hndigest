version: "3.8"

services:
  hndigest:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # SQLite DB persistence
      - ./config:/app/config      # Config overrides
      - ./output:/app/output      # Generated digests
    environment:
      - HNDIGEST_DB_PATH=/app/data/hndigest.db
      - CORS_ORIGINS=http://localhost:3000
    restart: unless-stopped
